<nav class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex items-center px-2 py-2 rounded-2xl border border-white/10 bg-black/80 backdrop-blur-xl shadow-2xl">

  <!-- Logo -->
  <a routerLink="/" class="group relative flex items-center justify-center px-3 py-2 rounded-xl text-white hover:scale-110 transition-all duration-150">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
    <span class="absolute -top-8 left-1/2 -translate-x-1/2 text-xs bg-zinc-800 text-white px-2 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-150 whitespace-nowrap pointer-events-none">Lendly</span>
  </a>

  <div class="w-px h-5 bg-white/10 mx-1"></div>

  <!-- Home -->
  <a routerLink="/" routerLinkActive="text-white bg-white/10" [routerLinkActiveOptions]="{exact:true}"
     class="group relative flex items-center justify-center px-3 py-2 rounded-xl text-zinc-500 hover:text-white hover:scale-110 transition-all duration-150">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span class="absolute -top-8 left-1/2 -translate-x-1/2 text-xs bg-zinc-800 text-white px-2 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-150 whitespace-nowrap pointer-events-none">Home</span>
  </a>

  <!-- Browse -->
  <a routerLink="/tools" routerLinkActive="text-white bg-white/10"
     class="group relative flex items-center justify-center px-3 py-2 rounded-xl text-zinc-500 hover:text-white hover:scale-110 transition-all duration-150">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span class="absolute -top-8 left-1/2 -translate-x-1/2 text-xs bg-zinc-800 text-white px-2 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-150 whitespace-nowrap pointer-events-none">Browse</span>
  </a>

  <!-- Profile / Login -->
  <button (click)="goToProfile()"
     class="group relative flex items-center justify-center px-3 py-2 rounded-xl text-zinc-500 hover:text-white hover:scale-110 transition-all duration-150"
     [class.text-white]="auth.isLoggedIn()"
     [class.bg-white\/10]="auth.isLoggedIn()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="absolute -top-8 left-1/2 -translate-x-1/2 text-xs bg-zinc-800 text-white px-2 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-150 whitespace-nowrap pointer-events-none">
      {{ auth.isLoggedIn() ? 'Profile' : 'Login' }}
    </span>
  </button>

  <div class="w-px h-5 bg-white/10 mx-1"></div>

  <!-- Add Tool -->
  <a routerLink="/add-tool"
     class="group relative flex items-center justify-center px-3 py-2 rounded-xl bg-white text-black hover:scale-110 transition-all duration-150">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="absolute -top-8 left-1/2 -translate-x-1/2 text-xs bg-zinc-800 text-white px-2 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-150 whitespace-nowrap pointer-events-none">Add Tool</span>
  </a>

</nav>
