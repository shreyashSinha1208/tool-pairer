<div style="max-width:1100px;margin:0 auto;padding:48px 24px;">
  <!-- Header + Search -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px;flex-wrap:wrap;">
    <div>
      <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0 0 4px;">Browse Tools</h1>
      <p style="font-size:13px;color:#666;margin:0;">{{ tools().length }} tools available</p>
    </div>
    <div style="position:relative;flex:1;max-width:320px;">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input
        type="text"
        placeholder="Search by name, category..."
        [ngModel]="query()"
        (ngModelChange)="onSearch($event)"
        style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 12px 9px 34px;font-size:13px;outline:none;transition:border-color 0.15s;"
        onfocus="this.style.borderColor='#444'" onblur="this.style.borderColor='var(--border)'"
      />
    </div>
  </div>

  <!-- Grid -->
  @if (tools().length > 0) {
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;">
      @for (tool of tools(); track tool.id) {
        <app-tool-card [tool]="tool" />
      }
    </div>
  } @else {
    <div style="text-align:center;padding:80px 0;">
      <div style="font-size:32px;margin-bottom:12px;">🔧</div>
      <p style="font-size:14px;color:#555;">No tools match "{{ query() }}"</p>
    </div>
  }
</div>
