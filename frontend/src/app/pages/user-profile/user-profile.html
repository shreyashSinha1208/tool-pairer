<div class="max-w-1100px mx-auto px-6 py-12">
  @if (user(); as u) {
    <div class="flex items-center gap-4 mb-10 pb-8 border-b border-white/10">
      <div class="w-12 h-12 rounded-full flex items-center justify-center text-lg font-semibold text-zinc-400 border border-white/10" style="background:var(--surface-2)">
        {{ u.name[0] }}
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight">{{ u.name }}</h1>
        <p class="text-sm text-zinc-500">{{ u.email }}</p>
      </div>
      <div class="ml-auto flex items-center gap-3">
        <span class="text-sm text-zinc-500 border border-white/10 px-3 py-1.5 rounded-md" style="background:var(--surface)">
          {{ tools().length }} tool{{ tools().length !== 1 ? 's' : '' }}
        </span>
        <!-- Logout -->
        <button (click)="logout()"
          class="text-sm text-zinc-400 border border-white/10 px-3 py-1.5 rounded-md hover:text-white hover:border-white/30 transition-all"
          style="background:var(--surface)">
          Logout
        </button>
      </div>
    </div>

    <p class="text-xs font-semibold text-zinc-600 uppercase tracking-widest mb-5">Listed Tools</p>
    @if (tools().length > 0) {
      <div class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">
        @for (tool of tools(); track tool.id) {
          <app-tool-card [tool]="tool" />
        }
      </div>
    } @else {
      <p class="text-sm text-zinc-600">No tools listed yet.</p>
    }
  } @else {
    <p class="text-sm text-zinc-500">User not found.</p>
  }
</div>
